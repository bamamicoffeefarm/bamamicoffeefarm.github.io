<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Ba Ma Mi Coffee Farm</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&family=Inter:wght@100..900&display=swap" rel="stylesheet">
    <style>
      body {
        margin: 0;
        padding: 0;
        background-color: #f5f5f0;
        font-family: 'Cormorant Garamond', serif;
      }
      .loading-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background-color: #f5f5f0;
        z-index: 9999;
        transition: opacity 0.5s ease;
      }
      .logo-container {
        text-align: center;
        margin-bottom: 2rem;
      }
      .logo-text {
        font-size: 3rem;
        font-weight: 300;
        color: #5A5A40;
        letter-spacing: 0.1em;
        margin: 0;
      }
      .logo-sub {
        font-size: 0.9rem;
        text-transform: uppercase;
        letter-spacing: 0.3em;
        color: #8c8c7a;
        margin-top: 0.5rem;
      }
      .loader {
        width: 40px;
        height: 40px;
        border: 2px solid rgba(90, 90, 64, 0.1);
        border-top: 2px solid #5A5A40;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="initial-loader" class="loading-screen">
      <div class="logo-container">
        <h1 class="logo-text">Ba Ma Mi</h1>
        <div class="logo-sub">Coffee Farm</div>
      </div>
      <div class="loader"></div>
    </div>
    <app-root></app-root>
  </body>
</html>
